services:
  # ProverbSeed: Sert les fichiers compilés (dist) par Nginx
  proverbseed:
    image: nginx:alpine
    container_name: proverbseed
    volumes:
      # On monte le dossier dist généré par le build de Vite
      - ./dist:/usr/share/nginx/html
      # On monte la config Nginx pour le support SPA/PWA
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # Debug: Teste la configuration avant de lancer
    command: sh -c "nginx -t && nginx -g 'daemon off;'"
    restart: always
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.proverbseed.rule=Host(`${SUBDOMAIN}.${DOMAIN_NAME}`)
      - traefik.http.routers.proverbseed.tls=true
      - traefik.http.routers.proverbseed.entrypoints=websecure
      - traefik.http.routers.proverbseed.tls.certresolver=letsencrypt
      - traefik.http.middlewares.proverbseed.headers.SSLRedirect=true
      - traefik.http.middlewares.proverbseed.headers.STSSeconds=315360000
      - traefik.http.middlewares.proverbseed.headers.browserXSSFilter=true
      - traefik.http.middlewares.proverbseed.headers.contentTypeNosniff=true
      - traefik.http.middlewares.proverbseed.headers.forceSTSHeader=true
      - traefik.http.middlewares.proverbseed.headers.SSLHost=${DOMAIN_NAME}
      - traefik.http.middlewares.proverbseed.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.proverbseed.headers.STSPreload=true
      - traefik.http.routers.proverbseed.middlewares=proverbseed@docker
      - traefik.http.services.proverbseed.loadbalancer.server.port=80

networks:
  proxy:
    external: true
